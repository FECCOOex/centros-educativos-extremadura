<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Centros Educativos de Extremadura</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f3f4f6;
color:#222;
}

/* CABECERA */

header{
display:flex;
align-items:center;
padding:14px 24px;
background:#d60000;
color:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.25);
position:sticky;
top:0;
z-index:10;
}

header img{
height:52px;
margin-right:14px;
}

header h1{
margin:0;
font-size:1.6rem;
font-weight:700;
}

/* CARRUSEL */

.campaign-wrap{
max-width:1300px;
margin:20px auto;
padding:0 16px;
}

.carousel{
background:#fff;
border:1px solid #e1e4ea;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
overflow:hidden;
position:relative;
}

.carousel-track{
display:flex;
transition:transform .35s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
max-height:260px;
object-fit:contain;
display:block;
background:#fff;
}

.carousel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
border:none;
background:rgba(0,0,0,0.35);
color:#fff;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.carousel-btn.prev{left:10px;}
.carousel-btn.next{right:10px;}

.dots{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
gap:8px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:rgba(0,0,0,0.35);
cursor:pointer;
}

.dot.active{
background:#d60000;
}

/* BOTON DELEGADOS */

.delegados-wrap{
display:flex;
justify-content:center;
margin:30px 0;
}

.delegados-btn{
background:#d60000;
color:#fff;
text-decoration:none;
font-weight:700;
padding:10px 16px;
border-radius:20px;
}

/* FOOTER */

footer{
margin-top:60px;
padding:20px;
background:#222;
color:#fff;
text-align:center;
font-size:.9rem;
}

</style>
</head>

<body>

<header>
<img src="img/feccooex.png" alt="FECCOOEx">
<h1>Centros Educativos de Extremadura</h1>
</header>


<div class="campaign-wrap">

<div class="carousel" id="campaignCarousel">

<div class="carousel-empty" id="carouselEmpty">Cargando campañas…</div>

<button class="carousel-btn prev" id="carouselPrev" style="display:none;">‹</button>
<button class="carousel-btn next" id="carouselNext" style="display:none;">›</button>

<div class="carousel-track" id="carouselTrack" style="display:none;"></div>

<div class="dots" id="carouselDots" style="display:none;"></div>

</div>

</div>


<div class="delegados-wrap">
<a class="delegados-btn" href="delegados.html">Área delegados/as</a>
</div>


<footer>
Federación de Enseñanza de CCOO de Extremadura
</footer>


<script>

const BANNERS_CSV="banners.csv";

const elEmpty=document.getElementById("carouselEmpty");
const elTrack=document.getElementById("carouselTrack");

fetch(BANNERS_CSV)
.then(r=>r.text())
.then(text=>{

const lines=text.split("\n").filter(l=>l.trim()!="");

if(lines.length<2){
elEmpty.textContent="No hay campañas activas.";
return;
}

const headers=lines[0].split(",");
const rows=lines.slice(1).map(l=>l.split(","));

rows.forEach(r=>{

const slide=document.createElement("div");
slide.className="slide";

const img=document.createElement("img");
img.src=r[headers.indexOf("imagen")];

slide.appendChild(img);
elTrack.appendChild(slide);

});

elTrack.style.display="flex";
elEmpty.style.display="none";

});

</script>

</body>
</html>
